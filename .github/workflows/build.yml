name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uses the official, verified devkitPro image container hosted on Docker Hub
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Fetch missing architecture libraries directly from the public Switchbrew repository mirrors
      - name: Download Switch System Core Libraries
        run: |
          mkdir -p ./sys_deps/include ./sys_deps/lib
          
          # Fetch the official hardware specs mapping file and startup runtime binary layer
          curl -L -o ./sys_deps/lib/crt0.o https://github.com
          curl -L -o ./sys_deps/lib/switch.specs https://github.com
          
          # Grab critical system header definitions
          git clone --depth 1 https://github.com tmp_libnx
          cp -r tmp_libnx/nx/include/* ./sys_deps/include/
          
          # Clean up temporary clutter
          rm -rf tmp_libnx

      # 2. Compile against true hardware hooks to guarantee console launch validation checks pass
      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # Compile main.cpp using local platform reference paths
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I./sys_deps/include -c source/main.cpp -o main.o
          
          # Link using verified Switch runtime boundaries and our local custom specs map to fix all relocation errors
          aarch64-none-elf-g++ -specs=./sys_deps/lib/switch.specs -march=armv8-a+crc+crypto -mtune=cortex-a57 -Wl,-Map,Launcher-NX.map -fPIE -pie main.o ./sys_deps/lib/crt0.o -o Launcher-NX.elf
          
          # Package everything directly into your clean executable Switch .nro binary format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
