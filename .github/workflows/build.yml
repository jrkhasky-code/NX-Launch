name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uses a pre-configured platform development image container that has libnx pre-installed
    container: ghcr.io/boiler-plate/devkitpro-switch:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Compiles using the container's built-in framework paths
      - name: Compile Native NRO
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Compile main.cpp using local platform reference paths
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I$DEVKITPRO/libnx/include -c source/main.cpp -o main.o
          
          # 2. Link object safely with position-independent placement parameters (-fPIE)
          aarch64-none-elf-g++ -specs=$DEVKITPRO/libnx/switch.specs -march=armv8-a+crc+crypto -mtune=cortex-a57 -fPIE -pie main.o -L$DEVKITPRO/libnx/lib -lnx -o Launcher-NX.elf
          
          # 3. Convert the standalone ELF payload directly into your clean executable Switch .nro binary format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
