name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Cleanly initialize the official Switch SDK cross-compiling environment
      - name: Set up Native Switch Cross-Compiler Tools
        run: |
          brew tap dborth/switch-tools
          brew install aarch64-elf-gcc switch-tools
          
          # Automatically map tracking paths so the Makefile finds our tools instantly
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITA64=/opt/devkitpro/devkitA64" >> $GITHUB_ENV

      # 2. Build the application using our official template framework rules
      - name: Run Build
        run: |
          # Create symbolic links to match standard devkitpro cross-compiler naming variables
          sudo mkdir -p /opt/devkitpro/devkitA64/bin
          sudo ln -s $(which aarch64-elf-g++) /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++
          sudo ln -s $(which aarch64-elf-gcc) /opt/devkitpro/devkitA64/bin/aarch64-none-elf-gcc
          sudo ln -s $(which aarch64-elf-ar) /opt/devkitpro/devkitA64/bin/aarch64-none-elf-ar
          
          # Pull down core hardware layout files to clear the switch_rules dependency inclusions
          sudo mkdir -p /opt/devkitpro/libnx
          sudo git clone --depth 1 https://github.com /opt/devkitpro/libnx_src
          sudo cp -r /opt/devkitpro/libnx_src/nx /opt/devkitpro/libnx/
          
          # Force execute the template make routine
          make

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
