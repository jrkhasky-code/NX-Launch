name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Download official compiled binaries directly from standalone public archives
      - name: Extract Freestanding Toolchains
        run: |
          mkdir -p ./tools ./sys_deps/include ./sys_deps/lib
          
          # Fetch the verified aarch64 cross-compiler binaries
          curl -L -o gcc.tar.xz https://github.com
          tar -xf gcc.tar.xz
          
          # Fetch official compiled Switch tools layout packages
          curl -L -o tools.tar.gz https://github.com
          tar -xf tools.tar.gz -C ./tools --strip-components=1 2>/dev/null || cp -r switch-tools*/* ./tools/ 2>/dev/null || true
          
          # Pull the native Switch OS library framework from open source mirrors
          git clone --depth 1 https://github.com libnx_src
          export PATH=$(pwd)/aarch64-none-elf-gcc-13.2.0-x86_64-linux/bin:$PATH
          make -C libnx_src/nx -j$(nproc)
          
          # Relocate framework files into local directory mappings
          cp -r libnx_src/nx/include/* ./sys_deps/include/
          cp libnx_src/nx/lib/libnx.a ./sys_deps/lib/
          cp libnx_src/nx/lib/crt0.o ./sys_deps/lib/
          cp libnx_src/nx/switch.specs ./sys_deps/lib/

      # 2. Compile and link everything together using the locally verified environment paths
      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$(pwd)/aarch64-none-elf-gcc-13.2.0-x86_64-linux/bin:$(pwd)/tools:$PATH
          
          # Compile main.cpp using local platform reference paths
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I./sys_deps/include -c source/main.cpp -o main.o
          
          # Link using verified Switch runtime boundaries and the official switch.specs map
          aarch64-none-elf-g++ -specs=./sys_deps/lib/switch.specs -march=armv8-a+crc+crypto -mtune=cortex-a57 -Wl,-Map,Launcher-NX.map -fPIE -pie main.o ./sys_deps/lib/crt0.o -L./sys_deps/lib -lnx -o Launcher-NX.elf
          
          # Package everything directly into your clean executable Switch .nro binary format
          if [ -f "./tools/elf2nro" ]; then
            ./tools/elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"
          else
            elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"
          fi

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
