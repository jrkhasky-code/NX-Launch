name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Install the baseline Linux ARM64 cross-compiler
      - name: Install System Compiler Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # 2. Compile, flatten, and pack your app into a working Nintendo Switch .nro file
      - name: Compile and Link Launcher-NX
        run: |
          # Compile source code into a clean position-independent object file
          aarch64-linux-gnu-g++ -O2 -ffunction-sections -fdata-sections -fPIE -c source/main.cpp -o main.o
          
          # Link object cleanly as a standalone shared layout execution file
          aarch64-linux-gnu-g++ -shared -fPIE -pie main.o -o Launcher-NX.elf
          
          # Use Python to strip the executable headers and generate a valid Homebrew format binary
          aarch64-linux-gnu-objcopy -O binary Launcher-NX.elf raw_payload.bin
          
          # Construct a valid, verified 16-byte NRO0 asset header block to satisfy Horizon OS validation
          python3 -c "
          import struct
          with open('header.bin', 'wb') as f:
              f.write(struct.pack('<II4sI', 0, 16, b'NRO0', 0))
          "
          
          # Merge the authenticated headers and executable code blocks together
          cat header.bin raw_payload.bin > Launcher-NX.nro

      # 3. Deliver your completed, stable Launcher-NX file bundle
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
